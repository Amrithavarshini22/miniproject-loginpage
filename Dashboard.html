<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .dashboard-container {
            background: white;
            padding: 50px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
            width: 400px;
        }
        h1 {
            color: #333;
        }
        .welcome {
            color: #4CAF50;
            font-size: 24px;
        }
        .logout-btn {
            padding: 12px 30px;
            background: #f44336;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
        }
        .logout-btn:hover {
            background: #d32f2f;
        }
        .user-info {
            background: #e8f5e9;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <h1>🏠 Dashboard</h1>
        
        <div class="user-info">
            <p class="welcome">Welcome, <span th:text="${username}">User</span>! 👋</p>
            <p>You have successfully logged in!</p>
        </div>
        
        <a href="/logout">
            <button class="logout-btn">Logout</button>
        </a>
    </div>

</body>
</html>
